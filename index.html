<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet" />
  <style>
    body {
      background-color: #0b0b0b;
      color: #00ffcc;
      font-family: 'Minecraftia', monospace;
      padding: 20px;
    }
    h1, h2 { color: #ffd700; text-shadow: 1px 1px 2px #000; }
    section {
      border: 2px solid #333;
      padding: 10px;
      margin: 10px 0;
      background-color: #111;
      box-shadow: 0 0 10px #222;
    }
    button {
      background: #222;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      padding: 6px 12px;
      margin: 5px;
      font-family: 'Minecraftia';
      cursor: pointer;
    }
    .pulsation {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    body.rituel-off * {
      animation: none !important;
      filter: grayscale(100%) brightness(0.5);
    }
    body.rituel-off button {
      border-color: #666;
      color: #666;
    }
    body.rituel-off section {
      background-color: #000;
      border-color: #222;
    }
  </style>
</head>
<body>
  <h1>🌌 Cockpit Cosmique</h1>

  <section><h2>🚀 Vitesse</h2>
    <div id="temps">Temps : 0.00 s</div>
    <div id="vitesse">--</div>
    <div id="distance">--</div>
    <div id="pourcentage">--</div>
    <button id="marche">▶️ Marche</button>
    <button id="stop">⏹️ Arrêt</button>
    <button id="reset">🔄 Réinitialiser</button>
  </section>

  <section><h2>☀️🌙 Médaillon céleste</h2>
    <div id="culmination-soleil">--</div>
    <div id="heure-vraie">--</div>
    <div id="heure-moyenne">--</div>
    <div id="equation-temps">--</div>
    <div id="lune-phase">--</div>
    <div id="lune-mag">--</div>
    <div id="lune-lever">--</div>
    <div id="lune-coucher">--</div>
    <div id="lune-culmination">--</div>
  </section>

  <section><h2>⏰ Horloge</h2>
    <div id="horloge-minecraft">00:00:00</div>
    <div id="horloge-atomique">--</div>
  </section>

  <section><h2>🌡️ Météo & Air</h2>
    <div id="meteo">--</div>
    <div id="qualite-air">--</div>
  </section>

  <section><h2>📐 Capteurs</h2>
    <div id="capteurs">--</div>
  </section>

  <section><h2>🧪 Grandeurs</h2>
    <div id="grandeurs">--</div>
  </section>

  <section><h2>🎛️ Contrôle</h2>
    <button id="toggle-rituel">✨ Rituel cosmique : ON</button>
    <button id="toggle-physique">🧲 Physique : ON</button>
    <button id="toggle-chimie">🧪 Chimie : ON</button>
    <button id="toggle-svt">🌱 SVT : ON</button>
  </section>

  <script type="module">
    import * as SunCalc from 'https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js';

    let watchId = null, positionPrecedente = null, vitesses = [], vitesseMax = 0, distanceTotale = 0, t0 = null;
    const applicateurs = { physique: true, chimie: true, svt: true };
    let rituelActif = true;

    const set = (id, txt) => document.getElementById(id).textContent = txt;

    document.getElementById('marche').onclick = () => {
      if (watchId !== null) return;
      t0 = performance.now();
      navigator.geolocation.getCurrentPosition(pos => traiter(pos.coords, pos.timestamp));
      watchId = navigator.geolocation.watchPosition(pos => traiter(pos.coords, pos.timestamp), err => set('vitesse', 'Erreur GPS'), { enableHighAccuracy: true });
      loopTemps(); activerHorloge(); synchroniserHeureAtomique(); activerCapteurs(); chargerMeteo();
    };

    document.getElementById('stop').onclick = () => {
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
        set('vitesse', '⏹️ Suivi arrêté');
      }
    };

    document.getElementById('reset').onclick = () => {
      vitesses = []; vitesseMax = 0; distanceTotale = 0; positionPrecedente = null;
      set('vitesse', '--'); set('distance', '--'); set('pourcentage', '--');
    };

    document.getElementById('toggle-rituel').onclick = () => {
      rituelActif = !rituelActif;
      document.body.classList.toggle('rituel-off', !rituelActif);
      document.getElementById('toggle-rituel').textContent = rituelActif ? '✨ Rituel cosmique : ON' : '🔋 Rituel cosmique : OFF';
    };
