<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compteur Vitesse GPS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>🚀 Vitesse instantanée</h1>
    <div id="vitesse-gps">-- km/h</div>
    <div id="statut-gps">📡 En attente du signal...</div>
    <button id="bouton-marche">▶️ Démarrer</button>
  </main>

  <script type="module">
    import { demarrerVitesseLive, arreterVitesseLive } from './js/vitesseLive.js';

    let actif = false;
    const bouton = document.getElementById('bouton-marche');

    bouton.addEventListener('click', () => {
      actif = !actif;
      if (actif) {
        demarrerVitesseLive();
        bouton.textContent = '⏹️ Arrêter';
      } else {
        arreterVitesseLive();
        bouton.textContent = '▶️ Démarrer';
        document.getElementById('vitesse-gps').textContent = '-- km/h';
        document.getElementById('statut-gps').textContent = '🛑 Compteur arrêté';
      }
    });
  </script>
  <script src="sw-register.js"></script>
</body>
</html>
