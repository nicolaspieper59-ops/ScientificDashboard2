<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>🌌 Cockpit Cosmique Ultime</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet" />
  <style>
    body {
      background-color: #0b0b0b;
      color: #00ffcc;
      font-family: 'Minecraftia', monospace;
      padding: 20px;
    }
    h1, h2 { color: #ffd700; text-shadow: 1px 1px 2px #000; }
    section { border: 2px solid #333; padding: 10px; margin: 10px 0; background-color: #111; box-shadow: 0 0 10px #222; }
    button { background: #222; color: #00ffcc; border: 2px solid #00ffcc; padding: 6px 12px; margin: 5px; font-family: 'Minecraftia'; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🌌 Cockpit Cosmique Ultime</h1>

  <section>
    <h2>🚀 GPS & Vitesse</h2>
    <div id="vitesse">Vitesse : --</div>
    <div id="distance">Distance : --</div>
    <div id="pourcentage">% Lumière / Son : --</div>
    <div id="gps">Précision GPS : --</div>
    <button id="marche">▶️ Démarrer</button>
    <button id="stop">⏹️ Arrêter</button>
    <button id="reset">🔄 Réinitialiser</button>
  </section>

  <section>
    <h2>☀️🌙 Médaillon céleste</h2>
    <div id="culmination-soleil">--</div>
    <div id="heure-vraie">--</div>
    <div id="heure-moyenne">--</div>
    <div id="equation-temps">--</div>
    <div id="lune-phase">--</div>
    <div id="lune-mag">--</div>
    <div id="lune-lever">--</div>
    <div id="lune-coucher">--</div>
    <div id="lune-culmination">--</div>
  </section>

  <section>
    <h2>⏰ Horloge</h2>
    <div id="horloge-minecraft">00:00:00</div>
    <div id="horloge-atomique">Heure atomique : --</div>
  </section>

  <section>
    <h2>📐 Capteurs</h2>
    <div id="capteurs">Lumière : -- lux | Son : -- dB | Orientation : --°</div>
  </section>

  <section>
    <h2>🧪 Grandeurs</h2>
    <div id="grandeurs">--</div>
  </section>

  <script type="module" src="cockpit.js"></script>
</body>
</html>
