<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cockpit Scientifique Test</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; margin-bottom: 20px; }
h2, h3 { margin: 0 0 10px 0; }
#map { width: 100%; height: 300px; margin-bottom:10px; }
canvas { width: 100%; height: 180px; background: #fafafa; margin-bottom:10px; }
.small { font-size: 0.85rem; color: #555; }
button { padding: 5px 10px; border-radius: 5px; border: none; background: #007BFF; color: #fff; cursor: pointer; margin-right:5px; }
button:hover { background: #0056b3; }
</style>
</head>
<body>
<h2>Cockpit Scientifique Test</h2>

<div class="card">
<h3>Carte GPS & Trajectoire</h3>
<div id="map"></div>
<p class="small">
Lat: <span id="lat">0.000000</span>, Lon: <span id="lon">0.000000</span>, Alt: <span id="alt">0.0</span><br>
Précision GPS: <span id="gpsAcc">0</span> m<br>
Vitesse instantanée: <span id="speed">0</span> km/h, Vitesse max: <span id="speedMax">0</span> km/h<br>
Distance: <span id="distanceKm">0</span> km
</p>
<button id="toggleBtn">Marche</button>
<button id="resetBtn">Réinitialiser</button>
</div>

<div class="card">
<h3>Horloge Minecraft</h3>
<p class="small"><time id="mcClock">00:00:00</time></p>
</div>

<div class="card">
<h3>Météo & Environnement</h3>
<p class="small">
Temp: <span id="temp">0.0</span> °C, Pression: <span id="pressure">0</span> hPa, Humidité: <span id="hum">0</span>%<br>
Vent: <span id="wind">0</span> km/h
</p>
<canvas id="tempChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
