<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cockpit Scientifique</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cockpit Scientifique</h1>

<div id="gps" class="info-box">GPS : --</div>
<div id="latitude" class="info-box">Latitude : --</div>
<div id="longitude" class="info-box">Longitude : --</div>
<div id="altitude" class="info-box">Altitude : --</div>

<div id="vitesse" class="info-box">Vitesse : -- km/h (GPS + IMU)</div>
<div id="vitesse-moy" class="info-box">Vitesse moyenne : -- km/h</div>
<div id="distance" class="info-box">Distance : -- m</div>

<div id="orientation" class="info-box">Orientation : -- (Magnétomètre + Gyroscope)</div>
<div id="acceleration" class="info-box">Accélération : -- (IMU)</div>
<div id="lumiere" class="info-box">Luminosité : -- (Capteur lumière)</div>

<div>
  <button onclick="demarrer()">▶️ Démarrer</button>
  <button onclick="stop()">⏹️ Arrêter</button>
  <button onclick="resetAll()">🔁 Réinitialiser</button>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
