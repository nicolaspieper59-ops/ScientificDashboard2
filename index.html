<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Tracking Avancé avec Contrôles</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #333; }
        .data-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .data-box { 
            background-color: #fff; 
            border: 1px solid #e0e0e0; 
            border-radius: 8px; 
            padding: 20px; 
            width: 250px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        .data-box h3 { margin-top: 0; color: #007bff; font-size: 1.1em; }
        .value { font-size: 2.2em; font-weight: 700; color: #333; display: block; }
        .unit { font-size: 0.9em; color: #6c757d; }
        #status { margin-top: 20px; padding: 10px; border-radius: 4px; }
        
        /* Styles des boutons */
        #controls button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            margin: 5px;
            transition: background-color 0.3s;
        }
        #start-stop-btn {
            background-color: #28a745; /* Vert pour Démarrer */
            color: white;
        }
        #start-stop-btn.running {
            background-color: #dc3545; /* Rouge pour Arrêter */
        }
        #reset-btn {
            background-color: #ffc107;
            color: #333;
        }
    </style>
</head>
<body>

    <h1>GPS Tracker - Contrôles</h1>
    
    <div id="controls">
        <button id="start-stop-btn" onclick="toggleTracking()">Démarrer le suivi</button>
        <button id="reset-btn" onclick="resetTracking()">Réinitialiser les données</button>
    </div>

    <div class="data-grid">
        <div class="data-box">
            <h3>Vitesse Instantanée (GNSS)</h3>
            <span id="speed-current" class="value">0.00</span>
            <span class="unit">km/h</span>
        </div>

        <div class="data-box">
            <h3>Vitesse Moyenne (Distance/Temps)</h3>
            <span id="speed-average" class="value">0.00</span>
            <span class="unit">km/h</span>
        </div>

        <div class="data-box">
            <h3>Vitesse Maximale</h3>
            <span id="speed-max" class="value">0.00</span>
            <span class="unit">km/h</span>
        </div>

        <div class="data-box">
            <h3>Distance Totale (3D)</h3>
            <span id="distance-total" class="value">0.00</span>
            <span class="unit">mètres</span>
        </div>

        <div class="data-box">
            <h3>Altitude (Vertical)</h3>
            <span id="altitude" class="value">N/A</span>
            <span class="unit">mètres</span>
        </div>
        
        <div class="data-box">
            <h3>Précision Horizontale</h3>
            <span id="accuracy-h" class="value">N/A</span>
            <span class="unit">mètres</span>
        </div>
        
        <div class="data-box">
            <h3>Durée Totale</h3>
            <span id="time-total" class="value">00:00:00</span>
            <span class="unit">h:m:s</span>
        </div>
    </div>

    <p id="status">Prêt à démarrer...</p>

    <script src="script.js"></script>
</body>
                </html>
