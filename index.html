<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calcul Solaire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🧭 Calcul Solaire avec Ajustement</h1>

  <section>
    <label for="date">📅 Date du Calcul</label>
    <input type="date" id="date" value="2025-10-08">

    <label for="heure">⏰ Heure Légale (HH:MM)</label>
    <input type="time" id="heure" value="16:47">

    <label for="longitude">🧭 Longitude (° Est)</label>
    <input type="number" id="longitude" step="0.01" placeholder="0.00">

    <label for="latitude">🧭 Latitude (° Nord)</label>
    <input type="number" id="latitude" step="0.01" placeholder="0.00">

    <label for="decalage">🌍 Décalage Fuseau Horaire (UTC)</label>
    <input type="number" id="decalage" step="0.5" placeholder="0">

    <button onclick="obtenirGPS()">📍 Obtenir ma Position GPS</button>
    <button onclick="calculerTempsSolaire()">⚙️ Calculer le Temps Solaire</button>

    <p id="statutGPS">Statut GPS: Non encore obtenu.</p>

    <div id="resultats" class="resultats">
      Résultats du Jour Solaire: Veuillez obtenir la position GPS et lancer le calcul.
    </div>
  </section>

  <script src="calcul-solaire.js"></script>
</body>
</html>
