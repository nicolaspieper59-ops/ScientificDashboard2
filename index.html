<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#111; color:#0ff; font-family: monospace; padding:1rem; }
    h1,h2 { color:#ffd700; }
    section { background:#222; margin:1rem 0; padding:1rem; border-radius:8px; }
    button { background:#0ff; color:#111; border:none; border-radius:6px; padding:0.5rem 1rem; cursor:pointer; font-weight:bold; }
    button:hover { background:#0aa; color:#fff; }
    #medaillon canvas { display:block; margin:auto; }
  </style>
</head>
<body>
  <h1>🚀 Cockpit Cosmique</h1>

  <section>
    <h2>Vitesse & Distance</h2>
    <div id="temps">Temps : 0.00 s</div>
    <div id="vitesse"></div>
    <div id="vitesse-moy"></div>
    <div id="vitesse-max"></div>
    <div id="vitesse-ms"></div>
    <div id="pourcentage"></div>
    <div id="distance"></div>
    <div id="distance-cosmique"></div>
    <button id="marche">▶️ Marche</button>
    <button id="reset">🔄 Reset Max</button>
  </section>

  <section>
    <h2>Capteurs</h2>
    <div id="capteurs">--</div>
  </section>

  <section>
    <h2>Horloge cosmique</h2>
    <div id="horloge">--:--:--</div>
  </section>

  <section>
    <h2>Médaillon céleste</h2>
    <div id="medaillon"></div>
  </section>

  <section>
    <h2>GPS</h2>
    <div id="gps">--</div>
  </section>

  <script type="module" src="cockpitCosmique.js"></script>
</body>
</html>
