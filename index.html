<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Compteur Vitesse GPS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>🚀 Vitesse instantanée</h1>
    <div id="vitesse-gps">-- km/h</div>
  </main>

  <script type="module">
    import { collecterGPS, calculerVitesseInstantanee } from './js/compteurVitesse.js';

    setInterval(() => {
      const timestamp = Date.now();
      collecterGPS().then(gps => {
        const vitesse = calculerVitesseInstantanee(gps, timestamp);
        document.getElementById('vitesse-gps').textContent = `${vitesse.toFixed(2)} km/h`;
      });
    }, 1000);
  </script>
</body>
</html>
