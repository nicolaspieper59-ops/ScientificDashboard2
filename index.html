<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cockpit Cosmique 3D — Version Stable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background:#111; color:#00ffcc; font-family:monospace; padding:20px; }
    h1 { color:#ffd700; }
    section { margin-bottom:20px; }
    button {
      background:#222; color:#00ffcc; border:2px solid #00ffcc;
      padding:10px; cursor:pointer; font-size:16px; margin-right:10px;
    }
  </style>
</head>
<body>
  <h1>🌌 Cockpit Cosmique 3D — Stable</h1>

  <section>
    <h2>🚀 Vitesse & Distance</h2>
    <div id="vitesse">Instant : -- km/h</div>
    <div id="vitesse-h">Horizontale : -- km/h</div>
    <div id="vitesse-v">Verticale : -- km/h</div>
    <div id="vitesse-moy">Moyenne : -- km/h</div>
    <div id="vitesse-max">Max : -- km/h</div>
    <div id="distance">Distance : -- km</div>
    <div id="temps">Temps : 0.00 s</div>
    <button id="marche">▶️ Marche</button>
    <button id="reset">🔄 Réinitialiser</button>
  </section>

  <section>
    <h2>📊 GPS</h2>
    <div id="gps">Lat : -- | Lon : -- | Alt : -- m | Précision : -- m</div>
  </section>

  <section>
    <h2>📐 Capteurs</h2>
    <div id="capteurs">Niveau : --° | Acc vertical : -- m/s²</div>
  </section>

  <script>
  // ===================== ÉTAT GLOBAL =====================
  let watchId = null;
  let positionPrecedente = null;
  let vitesses = [];
  let distanceTotale = 0;
  let vitesseMax = 0;
  let tempsDebut = null;
  let vitesseVerticaleAcc = 0;
  let accelPrecedente = null;

  const R_TERRE = 6371e3;

  // ===================== OUTILS =====================
  const setText = (id, txt) => { const e = document.getElementById(id); if (e) e.textContent = txt; };

  function haversine(p1, p2) {
    const φ1 = p1.coords.latitude * Math.PI / 180;
    const φ2 = p2.coords.latitude * Math.PI / 180;
    const Δφ = (p2.coords.latitude - p1.coords.latitude) * Math.PI / 180;
    const Δλ = (p2.coords.longitude - p1.coords.longitude) * Math.PI / 180;
    const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R_TERRE * c;
  }

  // ===================== FILTRAGE GPS =====================
  let lastAltitude = null;
  function filtreAltitude(alt) {
    if (lastAltitude === null) { lastAltitude = alt; return alt; }
    // Filtre passe-bas simple (lissage)
    const filtrée = 0.8 * lastAltitude + 0.2 * alt;
    lastAltitude = filtrée;
    return filtrée;
  }

  // ===================== GPS 3D =====================
  function vitesse3D(pos, prec) {
    if (!prec) return { total:0, horiz:0, vert:0 };
    const dt = (pos.timestamp - prec.timestamp) / 1000;
    if (dt <= 0) return { total:0, horiz:0, vert:0 };

    const dh = haversine(pos, prec);
    let alt1 = filtreAltitude(pos.coords.altitude ?? 0);
    let alt2 = filtreAltitude(prec.coords.altitude ?? 0);
    let dv = alt1 - alt2;
    if (Math.abs(dv) < 1) dv = 0; // ignore variations <1 m

    const vh = dh / dt;
    const vv = dv / dt;
    const vt = Math.sqrt(vh**2 + vv**2);
    return { total:vt, horiz:vh, vert:vv };
  }

  // ===================== ACCÉLÉROMÈTRE =====================
  function miseAJourVitesseVerticale(accel) {
    const dt = 0.05;
    if (accelPrecedente) {
      vitesseVerticaleAcc += ((accel.y || 0) + (accelPrecedente.y || 0)) / 2 * dt;
      // Filtrage du drift
      vitesseVerticaleAcc *= 0.98;
    }
    accelPrecedente = accel;
    return vitesseVerticaleAcc;
  }

  // ===================== MISE À JOUR =====================
  function miseAJourPosition(pos) {
    const v = vitesse3D(pos, positionPrecedente);
    positionPrecedente = pos;
    const vvAcc = miseAJourVitesseVerticale({ y: vitesseVerticaleAcc });
    const vTotal = Math.sqrt(v.total**2 + vvAcc**2);

    // Distance cumulée (horizontale seulement)
    if (pos.coords.latitude && pos.coords.longitude && positionPrecedente) {
      distanceTotale += haversine(pos, positionPrecedente);
    }

    // Filtrage lissant
    const vLissée = vitesses.length ? 0.8 * vitesses[vitesses.length-1] + 0.2 * vTotal : vTotal;
    vitesses.push(vLissée); if (vitesses.length > 60) vitesses.shift();

    vitesseMax = Math.max(vitesseMax, vLissée * 3.6);
    const moyenne = vitesses.reduce((a,b)=>a+b,0)/vitesses.length;

    // Affichage
    setText('vitesse', `Instant : ${(vLissée*3.6).toFixed(2)} km/h`);
    setText('vitesse-h', `Horizontale : ${(v.horiz*3.6).toFixed(2)} km/h`);
    setText('vitesse-v', `Verticale : ${(v.vert*3.6).toFixed(2)} km/h`);
    setText('vitesse-moy', `Moyenne : ${(moyenne*3.6).toFixed(2)} km/h`);
    setText('vitesse-max', `Max : ${vitesseMax.toFixed(2)} km/h`);

    setText('distance', `Distance : ${(distanceTotale/1000).toFixed(3)} km`);
    setText('gps', `Lat : ${pos.coords.latitude.toFixed(6)} | Lon : ${pos.coords.longitude.toFixed(6)} | Alt : ${(pos.coords.altitude??'--').toFixed(1)} m | ±${pos.coords.accuracy?.toFixed(0)} m`);

    const t = (Date.now() - tempsDebut) / 1000;
    setText('temps', `Temps : ${t.toFixed(2)} s`);
  }

  // ===================== CAPTEURS =====================
  function activerCapteurs() {
    if ('DeviceMotionEvent' in window) {
      window.addEventListener('devicemotion', e => {
        const a = e.accelerationIncludingGravity;
        const v = miseAJourVitesseVerticale(a);
        setText('capteurs', `Niveau : ${(e.rotationRate?.beta ?? 0).toFixed(1)}° | Acc vertical : ${v.toFixed(2)} m/s`);
      });
    }
  }

  // ===================== CONTROLES =====================
  function demarrerCockpit() {
    if (!navigator.geolocation) { setText('gps', 'GPS indisponible'); return; }
    if (watchId !== null) return;
    tempsDebut = Date.now();
    watchId = navigator.geolocation.watchPosition(
      miseAJourPosition,
      err => setText('gps', 'Erreur GPS : ' + err.message),
      { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
    );
    activerCapteurs();
    document.getElementById('marche').textContent = '⏹️ Arrêt';
  }

  function arreterCockpit() {
    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
    watchId = null; positionPrecedente = null; vitesses = [];
    distanceTotale = 0; vitesseMax = 0; vitesseVerticaleAcc = 0;
    setText('vitesse','--'); setText('vitesse-h','--'); setText('vitesse-v','--');
    setText('vitesse-moy','--'); setText('vitesse-max','--'); setText('distance','--');
    setText('gps','--'); setText('temps','0.00 s'); setText('capteurs','--');
    document.getElementById('marche').textContent = '▶️ Marche';
  }

  function resetVitesse() {
    vitesseMax = 0;
    vitesses = [];
    setText('vitesse-max', 'Max : 0.00 km/h');
  }

  // ===================== INIT =====================
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('marche').addEventListener('click', () => {
      if (watchId === null) demarrerCockpit(); else arreterCockpit();
    });
    document.getElementById('reset').addEventListener('click', resetVitesse);
  });
  </script>
</body>
</html>
