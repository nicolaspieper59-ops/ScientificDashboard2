<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>🌌 Cockpit Cosmique</h1>

    <section>
      <h2>🚀 Vitesse & Distance</h2>
      <div id="vitesse">Vitesse : -- km/h</div>
      <div id="distance">Distance : -- km</div>
      <div id="pourcentage">% Lumière : --% | % Son : --%</div>
      <div id="gps">Latitude : -- | Longitude : -- | Altitude : --</div>
      <button id="marche">▶️ Démarrer</button>
      <button id="reset">🔄 Réinitialiser vitesse max</button>
    </section>

    <section>
      <h2>📐 Capteurs physiques</h2>
      <div id="capteurs">Lux : -- | dB : -- | Hz : --</div>
    </section>

    <section>
      <h2>⏰ Horloge cosmique</h2>
      <div id="horloge">--:--:--</div>
    </section>

    <section>
      <h2>☀️🌙 Médaillon céleste</h2>
      <div id="medaillon"></div>
    </section>
  </main>

  <script type="module">
    import { demarrerCockpit, arreterCockpit, resetVitesseMax } from './js/cockpit.js';

    const boutonMarche = document.getElementById('marche');
    const boutonReset = document.getElementById('reset');

    let actif = false;

    boutonMarche.addEventListener('click', () => {
      actif = !actif;
      if (actif) {
        demarrerCockpit();
        boutonMarche.textContent = '⏹️ Arrêter';
      } else {
        arreterCockpit();
        boutonMarche.textContent = '▶️ Démarrer';
      }
    });

    boutonReset.addEventListener('click', () => {
      resetVitesseMax();
    });
  </script>
</body>
</html>
