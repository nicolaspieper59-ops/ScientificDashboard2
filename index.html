<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cockpit GPS 3D</title>
<style>
  body { background: #111; color: #0ff; font-family: monospace; padding: 20px; }
  h1 { color: #ffd700; }
  button {
    background: #222; color: #0ff; border: 2px solid #0ff;
    padding: 10px; cursor: pointer; font-size: 16px; margin-right: 5px;
  }
  .info { margin: 5px 0; }
</style>
</head>
<body>

<h1>📍 Cockpit GPS 3D</h1>

<button id="marche">▶️ Marche</button>
<button id="reset">🔄 Reset Max</button>

<div class="info" id="vitesse">Instant : --</div>
<div class="info" id="vitesse-h">Horizontale : --</div>
<div class="info" id="vitesse-v">Verticale : --</div>
<div class="info" id="vitesse-moy">Moyenne : --</div>
<div class="info" id="vitesse-max">Max : --</div>
<div class="info" id="distance">Distance : --</div>
<div class="info" id="temps">Temps : 0.00 s</div>
<div class="info" id="gps">GPS : --</div>
<div class="info" id="capteurs">Acc vertical : --</div>
<div class="info" id="pression">Pression : --</div>

<script src="cockpit3d.js"></script>

</body>
</html>
