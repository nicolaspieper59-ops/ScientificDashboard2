<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Cockpit Cosmique Complet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>🌌 Cockpit Cosmique Complet</h1>

  <section>
    <h2>🚀 Vitesse & Distance</h2>
    <div id="vitesse">--</div>
    <div id="distance">--</div>
    <div id="pourcentage">--</div>
    <div id="gps">--</div>
    <button id="marche">▶️ Démarrer</button>
    <button id="reset">🔄 Réinitialiser vitesse max</button>
  </section>

  <section>
    <h2>📐 Capteurs physiques</h2>
    <div id="capteurs">--</div>
  </section>

  <section>
    <h2>🧭 Boussole & Destination</h2>
    <div id="boussole">--</div>
    <label>Latitude : <input id="destLat" type="number" step="0.000001"></label>
    <label>Longitude : <input id="destLon" type="number" step="0.000001"></label>
    <button id="definirDest">Aller</button>
  </section>

  <section>
    <h2>⏰ Horloge Minecraft</h2>
    <div id="horloge">--:--:--</div>
  </section>

  <section>
    <h2>☀️🌙 Médaillon céleste</h2>
    <div id="medaillon"></div>
  </section>

  <section>
    <h2>🌡️ Météo & Air</h2>
    <div id="meteo">--</div>
    <div id="qualite-air">--</div>
  </section>

  <section>
    <h2>🔬 Grandeurs scientifiques</h2>
    <div id="grandeurs">--</div>
  </section>
</main>

<script type="module" src="./js/cockpit.js"></script>
</body>
</html>
