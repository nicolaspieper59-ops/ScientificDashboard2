<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cockpit Cosmique - GPS & Records</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { background:#111; color:#0ff; font-family: monospace; padding:20px; }
  h1,h2 { color:#ffd700; }
  button { background:#222; color:#0ff; border:2px solid #0ff; padding:8px; margin:4px; cursor:pointer; }
  div { margin:4px 0; }
</style>
</head>
<body>
<h1>🌌 Cockpit Cosmique</h1>

<section>
  <h2>🚀 Vitesse & Distance</h2>
  <div id="vitesse">Vitesse instantanée : -- km/h</div>
  <div id="vitesse-moy">Vitesse moyenne : -- km/h</div>
  <div id="vitesse-max">Vitesse max : -- km/h</div>
  <div id="vitesse-ms">Vitesse : -- m/s | -- mm/s</div>
  <div id="pourcentage">% Lumière : --% | % Son : --%</div>
  <div id="distance">Distance : -- km | -- m | -- mm</div>
  <div id="distance-cosmique">Distance cosmique : -- s lumière | -- al</div>
  <div id="temps">Temps : 0.00 s</div>
  <div id="gps">GPS : --</div>
  <div id="record">Record : -- km/h</div>
  <div id="records"></div>
  <button id="marche">▶️ Démarrer</button>
  <button id="arreter">⏹️ Arrêter</button>
  <button id="reset">🔄 Réinitialiser vitesse max</button>
  <button id="reset-records">🧹 Effacer records</button>
</section>

<script>
// ========================
// VARIABLES GLOBALES
// ========================
let watchId = null;
let positionPrecedente = null;
let vitesseMax = 0;
let vitesses = [];
let distanceTotale = 0;
let tempsDebut = null;

// CONSTANTES
const VITESSE_LUMIERE = 299792458;
const VITESSE_SON = 343;
const R_TERRE = 6371e3;
const ANNEE_LUMIERE_SECONDES = 3600*24*365.25;

// ========================
// UTILITAIRES DOM
// ========================
function safeSetText(id, text){
  const e=document.getElementById(id);
  if(e) e.textContent=text;
}

// ========================
// CALCUL DISTANCE / VITESSE
// ========================
function calculerDistance(p1,p2){
  const φ1=p1.latitude*Math.PI/180;
  const φ2=p2.latitude*Math.PI/180;
  const Δφ=(p2.latitude-p1.latitude)*Math.PI/180;
  const Δλ=(p2.longitude-p1.longitude)*Math.PI/180;
  const a=Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  const c=2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R_TERRE*c;
}

function calculerVitesseManuelle(gps){
  if(!positionPrecedente){ positionPrecedente=gps; return 0; }
  const dt=(gps.timestamp-positionPrecedente.timestamp)/1000;
  const d=calculerDistance(gps, positionPrecedente);
  if(!Number.isFinite(d)||d<0||dt<=0){ positionPrecedente=gps; return 0; }
  distanceTotale+=d;
  positionPrecedente=gps;
  return (d/dt)*3.6;
}

// ========================
// AFFICHAGE
// ========================
function afficherVitesse(v_kmh){
  const mps=v_kmh/3.6;
  const mmps=mps*1000;
  const moyenne_kmh=vitesses.length ? vitesses.reduce((a,b)=>a+b,0)/vitesses.length : 0;
  safeSetText('vitesse', `Vitesse instantanée : ${v_kmh.toFixed(2)} km/h`);
  safeSetText('vitesse-moy', `Vitesse moyenne : ${moyenne_kmh.toFixed(2)} km/h`);
  safeSetText('vitesse-max', `Vitesse max : ${vitesseMax.toFixed(2)} km/h`);
  safeSetText('vitesse-ms', `Vitesse : ${mps.toFixed(2)} m/s | ${mmps.toFixed(0)} mm/s`);
  safeSetText('pourcentage', `% Lumière : ${(mps/VITESSE_LUMIERE*100).toExponential(2)}% | % Son : ${(mps/VITESSE_SON*100).toFixed(2)}%`);
}

function afficherDistance(){
  const km=distanceTotale/1000;
  const m=distanceTotale;
  const secLumiere=m/VITESSE_LUMIERE;
  const al=secLumiere/ANNEE_LUMIERE_SECONDES;
  safeSetText('distance',`Distance : ${km.toFixed(3)} km | ${m.toFixed(0)} m | ${Math.round(m*1000)} mm`);
  safeSetText('distance-cosmique',`Distance cosmique : ${secLumiere.toFixed(3)} s lumière | ${al.toExponential(3)} al`);
}

function afficherTemps(){
  if(!tempsDebut) return;
  const t=(Date.now()-tempsDebut)/1000;
  safeSetText('temps',`Temps : ${t.toFixed(2)} s`);
}

function afficherGPS(g){
  safeSetText('gps',`GPS : Latitude : ${g.latitude.toFixed(6)} | Longitude : ${g.longitude.toFixed(6)} | Altitude : ${g.altitude?.toFixed(0)??'--'} m | Précision : ${g.accuracy?.toFixed(0)??'--'} m`);
}

// ========================
// RECORDS
// ========================
function mettreAJourRecord(v_kmh){
  const ancien=parseFloat(localStorage.getItem('recordMax'))||0;
  if(v_kmh>ancien){
    localStorage.setItem('recordMax',v_kmh.toFixed(2));
    safeSetText('record', `🏆 Nouveau record ! ${v_kmh.toFixed(2)} km/h`);
  } else { safeSetText('record', `Record actuel : ${ancien.toFixed(2)} km/h`); }
}

function ajouterRecord(v_kmh){
  let records=JSON.parse(localStorage.getItem('records'))||[];
  records.push({vitesse:v_kmh,date:new Date().toLocaleString()});
  records.sort((a,b)=>b.vitesse-a.vitesse);
  records=records.slice(0,5);
  localStorage.setItem('records',JSON.stringify(records));
  afficherRecords(records);
}

function afficherRecords(records){
  const html=records.map(r=>`<li>${r.vitesse.toFixed(2)} km/h — ${r.date}</li>`).join('');
  document.getElementById('records').innerHTML=`<ul>${html}</ul>`;
}

function resetRecords(){
  localStorage.removeItem('recordMax');
  localStorage.removeItem('records');
  safeSetText('record','Record : -- km/h');
  document.getElementById('records').innerHTML='';
}

// ========================
// MISE À JOUR VITESSE
// ========================
function miseAJourVitesse(pos){
  const gps={
    latitude:pos.coords.latitude,
    longitude:pos.coords.longitude,
    altitude:pos.coords.altitude,
    accuracy:pos.coords.accuracy,
    timestamp:pos.timestamp,
    speed:pos.coords.speed
  };
  const vitesse_ms=(typeof gps.speed==='number' && gps.speed>=0)?gps.speed:calculerVitesseManuelle(gps)/3.6;
  const vitesse_kmh=vitesse_ms*3.6;
  if(!Number.isFinite(vitesse_kmh)||vitesse_kmh<0||vitesse_kmh>3000000) return;
  vitesseMax=Math.max(vitesseMax,vitesse_kmh);
  vitesses.push(vitesse_kmh);
  if(vitesses.length>60) vitesses.shift();
  afficherVitesse(vitesse_kmh);
  afficherDistance();
  afficherTemps();
  afficherGPS(gps);
  mettreAJourRecord(vitesse_kmh);
  ajouterRecord(vitesse_kmh);
}

// ========================
// DÉMARRAGE / ARRÊT
// ========================
function demarrerCockpit(){
  if(!("geolocation" in navigator)){ safeSetText('gps','GPS non disponible'); return; }
  if(watchId!==null) return;
  tempsDebut=Date.now();
  watchId=navigator.geolocation.watchPosition(miseAJourVitesse,
    err=>safeSetText('gps','Erreur GPS : '+err.code),
    {enableHighAccuracy:true, maximumAge:0, timeout:10000});
}

function arreterCockpit(){
  if(watchId!==null) navigator.geolocation.clearWatch(watchId);
  watchId=null;
  positionPrecedente=null;
  vitesses=[];
  distanceTotale=0;
  tempsDebut=null;
  vitesseMax=0;
  afficherVitesse(0);
  afficherDistance();
  safeSetText('gps','GPS : --');
}

// ========================
// ÉVÉNEMENTS
// ========================
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('marche').addEventListener('click',demarrerCockpit);
  document.getElementById('arreter').addEventListener('click',arreterCockpit);
  document.getElementById('reset').addEventListener('click',()=>{vitesseMax=0; afficherVitesse(0);});
  document.getElementById('reset-records').addEventListener('click',resetRecords);

  // Charger les records au démarrage
  const r=JSON.parse(localStorage.getItem('records'))||[];
  if(r.length) afficherRecords(r);
  const max=parseFloat(localStorage.getItem('recordMax'))||0;
  if(max>0) safeSetText('record',`Record actuel : ${max.toFixed(2)} km/h`);
});
</script>
</body>
  </html>
