<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cockpit Scientifique Live</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f0f2f5; }
.card { background: #fff; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; margin-bottom: 20px; }
h2, h3 { margin: 0 0 10px 0; }
#map { width: 100%; height: 300px; margin-bottom:10px; }
canvas { width: 100%; height: 180px; background: #fafafa; margin-bottom:10px; }
.small { font-size: 0.85rem; color: #555; }
button { padding: 5px 10px; border-radius: 5px; border: none; background: #007BFF; color: #fff; cursor: pointer; margin-right:5px; }
button:hover { background: #0056b3; }
</style>
</head>
<body>
<h2>Full Cockpit Scientifique Live</h2>

<div class="card">
<h3>Carte GPS & Trajectoire</h3>
<div id="map"></div>
<p class="small">
<span id="gps">GPS : --</span><br>
<span id="vitesse">Vitesse instantanée : -- km/h</span><br>
<span id="vitesse-moy">Vitesse moyenne : -- km/h</span><br>
<span id="vitesse-max">Vitesse max : -- km/h</span><br>
<span id="distance">Distance : -- km</span><br>
<span id="temps">Temps : 0.00 s</span>
</p>
<button id="toggleBtn">Démarrer</button>
<button id="resetBtn">Réinitialiser</button>
<button id="bleBtn">Connecter BLE/UWB</button>
</div>

<div class="card">
<h3>Horloge Minecraft</h3>
<canvas id="minecraft-clock"></canvas>
<p class="small" id="minecraft-time-display">--</p>
</div>

<div class="card">
<h3>Astronomie</h3>
<p class="small">
<span id="equation-temps">Équation du temps : --</span><br>
<span id="lune-phase">Phase Lune : --</span>
</p>
</div>

<div class="card">
<h3>Graphique Historique Vitesse</h3>
<canvas id="graphVitesse"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
<script>
// Liaisons boutons
document.getElementById('toggleBtn').addEventListener('click',()=>{
    if(window.watchId) window.arreterCockpit(); else window.demarrerCockpit();
});
document.getElementById('resetBtn').addEventListener('click',()=>{
    window.resetCockpit();
});
document.getElementById('bleBtn').addEventListener('click',()=>{
    if(window.settings.ble) window.connectBLE();
});
</script>
</body>
</html>
