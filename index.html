<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>🌌 Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="lib/d3.min.js"></script>
  <script src="lib/d3.geo.projection.min.js"></script>
  <script src="lib/celestial.min.js"></script>
</head>
<body>
  <main>
    <h1>🌌 Cockpit Cosmique</h1>

    <!-- Vitesse & Distance -->
    <section>
      <h2>🚀 Vitesse & Distance</h2>
      <div id="vitesse-gps">-- km/h</div>
      <div id="pourcentage">-- %</div>
      <div id="distance">-- km</div>
      <div id="statut-gps">📡 En attente GPS...</div>
      <button id="bouton-marche">▶️ Démarrer</button>
      <button id="reset">🔄 Réinitialiser vitesse max</button>
    </section>

    <!-- Capteurs -->
    <section>
      <h2>📐 Capteurs</h2>
      <div id="capteurs">--</div>
    </section>

    <!-- Horloge -->
    <section>
      <h2>⏰ Horloge cosmique</h2>
      <div id="horloge">--:--:--</div>
    </section>

    <!-- Médaillon céleste -->
    <section>
      <h2>☀️🌙 Médaillon céleste</h2>
      <div id="celestial-map"></div>
    </section>

    <!-- Contrôles -->
    <section>
      <h2>🎛️ Contrôles</h2>
      <button id="toggle-rituel">✨ Rituel cosmique : ON</button>
    </section>
  </main>

  <script type="module">
    import * as Cockpit from "./js/cockpit.js";

    const bouton = document.getElementById("bouton-marche");
    const resetBtn = document.getElementById("reset");

    let actif = false;

    bouton.addEventListener("click", () => {
      actif = !actif;
      if (actif) {
        Cockpit.demarrerCockpit();
        bouton.textContent = "⏹️ Arrêter";
      } else {
        Cockpit.arreterCockpit();
        bouton.textContent = "▶️ Démarrer";
        document.getElementById("vitesse-gps").textContent = "-- km/h";
        document.getElementById("statut-gps").textContent = "🛑 Compteur arrêté";
      }
    });

    resetBtn.addEventListener("click", () => {
      Cockpit.resetVitesseMax();
    });
  </script>
</body>
</html>
