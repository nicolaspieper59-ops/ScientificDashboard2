<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Test GPS Navigateur</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: #111;
      color: #00ffcc;
      font-family: monospace;
      padding: 20px;
    }
    h1 { color: #ffd700; }
    button {
      background: #222;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      padding: 10px;
      cursor: pointer;
      font-size: 16px;
    }
    #result { margin-top: 20px; }
  </style>
</head>
<body>
  <h1>📍 Test GPS Navigateur</h1>
  <button onclick="demarrerGPS()">▶️ Démarrer</button>
  <div id="result">En attente…</div>

  <script>
    function demarrerGPS() {
      if (!navigator.geolocation) {
        document.getElementById('result').textContent = '🌐 Géolocalisation non disponible';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          const c = pos.coords;
          document.getElementById('result').innerHTML = `
            Latitude : ${c.latitude.toFixed(6)}<br>
            Longitude : ${c.longitude.toFixed(6)}<br>
            Précision : ${c.accuracy.toFixed(1)} m
          `;
        },
        err => {
          document.getElementById('result').textContent = `Erreur GPS : ${err.message}`;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }
  </script>
</body>
</html>
