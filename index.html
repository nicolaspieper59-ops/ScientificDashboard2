<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
  <h1>🌌 Cockpit Cosmique (Offline Ready)</h1>

  <section>
    <h2>🚀 Temps & Vitesse</h2>
    <div id="temps">Temps : 0.00 s</div>
    <div id="vitesse">Vitesse instantanée : -- km/h</div>
    <div id="vitesse-moy">Vitesse moyenne : -- km/h</div>
    <div id="vitesse-max">Vitesse max : -- km/h</div>
    <div id="distance">Distance : -- km</div>
    <div id="gps">📡 En attente...</div>
    <button id="marche">▶️ Marche</button>
    <button id="stop">⏹️ Arrêt</button>
    <button id="reset">🔄 Reset</button>
  </section>

  <section>
    <h2>🌡️ Météo & Air</h2>
    <div id="meteo">Température : -- °C | Vent : -- km/h | Nuages : --%</div>
    <div id="air">Qualité air (PM2.5) : -- µg/m³</div>
  </section>

  <div id="map"></div>

  <script type="module" src="cockpit.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js")
        .then(() => console.log("✅ Service Worker enregistré"))
        .catch(err => console.error("❌ SW erreur:", err));
    }
  </script>
</body>
</html>
