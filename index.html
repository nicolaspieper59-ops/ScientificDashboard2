<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Diagnostic Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      background-color: #0b0b0b;
      color: #00ffcc;
      font-family: monospace;
      padding: 20px;
    }
    h1 { color: #ffd700; }
    section {
      border: 2px solid #333;
      padding: 10px;
      margin: 10px 0;
      background-color: #111;
    }
    button {
      background: #222;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      padding: 8px 16px;
      margin: 5px;
      cursor: pointer;
    }
    .label { margin: 4px 0; }
  </style>
</head>
<body>
  <h1>🚀 Diagnostic Cockpit Cosmique</h1>

  <section>
    <div class="label" id="latitude">Latitude : --</div>
    <div class="label" id="longitude">Longitude : --</div>
    <div class="label" id="gps">Précision GPS : -- m</div>
    <div class="label" id="vitesse">Vitesse : -- km/h</div>
    <div class="label" id="distance">Distance : -- m</div>
    <div class="label" id="temps">Temps : 0.00 s</div>
    <button onclick="demarrer()">▶️ Démarrer</button>
    <button onclick="reset()">🔄 Réinitialiser</button>
  </section>

  <script>
    let watchId = null;
    let positionPrecedente = null;
    let distanceTotale = 0;
    let t0 = null;

    function set(id, txt) {
      const el = document.getElementById(id);
      if (el) el.textContent = txt;
      else console.warn("❌ Élément introuvable :", id);
    }

    function demarrer() {
      console.log("▶️ Démarrage demandé");
      if (!navigator.geolocation) {
        console.error("🌐 Géolocalisation non disponible");
        set("gps", "🌐 Géolocalisation non disponible");
        return;
      }

      t0 = performance.now();
      navigator.geolocation.getCurrentPosition(pos => {
        console.log("📍 Position initiale reçue");
        traiter(pos.coords, pos.timestamp);
      });

      watchId = navigator.geolocation.watchPosition(
        pos => {
          console.log("📡 Position mise à jour");
          traiter(pos.coords, pos.timestamp);
        },
        err => {
          console.error("❌ Erreur GPS :", err.message);
          set("gps", `Erreur GPS : ${err.message}`);
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );

      boucleTemps();
    }

    function reset() {
      console.log("🔄 Réinitialisation");
      positionPrecedente = null;
      distanceTotale = 0;
      set("latitude", "Latitude : --");
      set("longitude", "Longitude : --");
      set("gps", "Précision GPS : -- m");
      set("vitesse", "Vitesse : -- km/h");
      set("distance", "Distance : -- m");
      set("temps", "Temps : 0.00 s");
    }

    function boucleTemps() {
      function tick() {
        const t = performance.now() - t0;
        set("temps", `Temps : ${(t / 1000).toFixed(2)} s`);
        requestAnimationFrame(tick);
      }
      tick();
    }

    function traiter(coords, timestamp) {
      set("latitude", `Latitude : ${coords.latitude.toFixed(6)}`);
      set("longitude", `Longitude : ${coords.longitude.toFixed(6)}`);
      set("gps", `Précision GPS : ${coords.accuracy?.toFixed(1) ?? "--"} m`);

      const vitesse = coords.speed != null ? coords.speed * 3.6 : calculerVitesse(coords, timestamp);
      set("vitesse", `Vitesse : ${vitesse.toFixed(2)} km/h`);
      set("distance", `Distance : ${distanceTotale.toFixed(1)} m`);
    }

    function calculerVitesse(c, t) {
      if (!positionPrecedente) {
        positionPrecedente = { ...c, timestamp: t };
        return 0;
      }
      const dt = (t - positionPrecedente.timestamp) / 1000;
      const d = calculerDistance(c, positionPrecedente);
      distanceTotale += d;
      positionPrecedente = { ...c, timestamp: t };
      console.log(`📐 Δt = ${dt.toFixed(2)} s | Δd = ${d.toFixed(2)} m`);
      return dt > 0 ? (d / dt) * 3.6 : 0;
    }

    function calculerDistance(a, b) {
      const R = 6371e3;
      const φ1 = a.latitude * Math.PI / 180;
      const φ2 = b.latitude * Math.PI / 180;
      const Δφ = (b.latitude - a.latitude) * Math.PI / 180;
      const Δλ = (b.longitude - a.longitude) * Math.PI / 180;
      const aVal = Math.sin(Δφ / 2) ** 2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(aVal), Math.sqrt(1 - aVal));
      return R * c;
    }
  </script>
</body>
</html>
