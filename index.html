<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cockpit Cosmique</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.cdnfonts.com/css/minecraftia" rel="stylesheet" />
  <style>
    body {
      background-color: #0b0b0b;
      color: #00ffcc;
      font-family: 'Minecraftia', monospace;
      padding: 20px;
    }
    h1, h2 {
      color: #ffd700;
      text-shadow: 1px 1px 2px #000;
    }
    section {
      border: 2px solid #333;
      padding: 10px;
      margin: 10px 0;
      background-color: #111;
      box-shadow: 0 0 10px #222;
    }
    button {
      background: #222;
      color: #00ffcc;
      border: 2px solid #00ffcc;
      padding: 6px 12px;
      margin: 5px;
      font-family: 'Minecraftia';
      cursor: pointer;
    }
    .pulsation {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    body.rituel-off * {
      animation: none !important;
      filter: grayscale(100%) brightness(0.5);
    }
    body.rituel-off button {
      border-color: #666;
      color: #666;
    }
    body.rituel-off section {
      background-color: #000;
      border-color: #222;
    }
  </style>
</head>
<body>
  <h1>🌌 Cockpit Cosmique</h1>

  <section><h2>🧪 Grandeurs</h2>
    <div id="vitesse">Vitesse : -- km/h</div>
    <div id="puissance">Puissance : -- W</div>
    <div id="lune-phase">Phase lunaire : --%</div>
    <div id="cardiaque">Fréquence cardiaque : -- bpm</div>
    <button id="amplifier">✨ Amplifier</button>
    <button id="toggle-rituel">🔮 Rituel : ON</button>
    <button id="toggle-physique">🧲 Physique : ON</button>
    <button id="toggle-chimie">🧪 Chimie : ON</button>
    <button id="toggle-svt">🌱 SVT : ON</button>
  </section>

  <script type="module" src="amplificateur.js"></script>
</body>
</html>
