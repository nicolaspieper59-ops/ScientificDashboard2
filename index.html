<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS - Vitesse et Position</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .data-box { border: 1px solid #ccc; padding: 15px; margin: 10px auto; width: 300px; }
        .data-box h3 { margin-top: 0; }
        .value { font-size: 2em; font-weight: bold; color: #007bff; }
        .unit { font-size: 0.8em; color: #6c757d; }
    </style>
</head>
<body>

    <h1>Mon Compteur GPS</h1>

    <div class="data-box">
        <h3>Vitesse Instantanée</h3>
        <span id="speed-current" class="value">0.00</span>
        <span class="unit">km/h</span>
    </div>

    <div class="data-box">
        <h3>Vitesse Moyenne (Corrigée)</h3>
        <span id="speed-average" class="value">0.00</span>
        <span class="unit">km/h</span>
    </div>

    <div class="data-box">
        <h3>Vitesse Maximale</h3>
        <span id="speed-max" class="value">0.00</span>
        <span class="unit">km/h</span>
    </div>

    <div class="data-box">
        <h3>Distance Parcourue</h3>
        <span id="distance-total" class="value">0.00</span>
        <span class="unit">m</span>
    </div>

    <div class="data-box">
        <h3>Altitude</h3>
        <span id="altitude" class="value">N/A</span>
        <span class="unit">m</span>
    </div>

    <p id="status">En attente des données GPS...</p>

    <script src="script.js"></script>
</body>
    </html>
